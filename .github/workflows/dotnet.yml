name: .NET

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "deploy/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "deploy/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install CA Certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # In CI, generate the HTTPS development cert without OS trust integration.
      - name: Prepare ASP.NET Core HTTPS Development Certificate
        run: dotnet dev-certs https

      - name: Restore dependencies
        run: dotnet restore CleanAspire.slnx

      - name: Build
        run: dotnet build CleanAspire.slnx --no-restore

      - name: Run tests
        run: dotnet test ./tests/CleanAspire.Tests/CleanAspire.Tests.csproj --no-build --verbosity normal
